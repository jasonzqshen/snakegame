<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    body { background: #222; display: flex; flex-direction: column; align-items: center; }
    canvas { background: #111; margin-top: 30px; }
    h1, p { color: #fff; }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <p>Use arrow keys to move. Refresh to restart.</p>
  <canvas id="game" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const grid = 20;
    let snake = [{x: 160, y: 200}];
    let dx = grid, dy = 0;
    let food = {x: 0, y: 0};
    let score = 0;
    let gameOver = false;

    function randomFood() {
      food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
      food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, grid, grid);

      // Draw snake
      ctx.fillStyle = 'lime';
      snake.forEach(part => ctx.fillRect(part.x, part.y, grid, grid));

      // Draw score
      ctx.fillStyle = '#fff';
      ctx.font = '16px Arial';
      ctx.fillText('Score: ' + score, 10, 20);
    }

    function moveSnake() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // Game over conditions
      if (
        head.x < 0 || head.x >= canvas.width ||
        head.y < 0 || head.y >= canvas.height ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver = true;
        alert('Game Over! Your score: ' + score);
        return;
      }

      snake.unshift(head);

      // Eat food
      if (head.x === food.x && head.y === food.y) {
        score++;
        randomFood();
      } else {
        snake.pop();
      }
    }

    function loop() {
      if (gameOver) return;
      moveSnake();
      draw();
      setTimeout(loop, 100);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
      else if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
      else if (e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
      else if (e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
    });

    randomFood();
    loop();
  </script>
</body>
</html>
